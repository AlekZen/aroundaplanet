<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Manual de Agente — Preview</title>
<style>
  body { max-width: 820px; margin: 2rem auto; padding: 0 1.5rem; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; line-height: 1.65; color: #1a1a1a; background: #fafaf8; }
  h1 { color: #1B4332; border-bottom: 3px solid #F4A261; padding-bottom: .5rem; }
  h2 { color: #1B4332; margin-top: 2.5rem; }
  h3 { color: #2d5a47; }
  blockquote { border-left: 4px solid #F4A261; background: #fff7ec; padding: .6rem 1rem; margin: 1rem 0; border-radius: 4px; }
  code { background: #eee; padding: .1rem .35rem; border-radius: 3px; font-size: .9em; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { border: 1px solid #ddd; padding: .5rem .75rem; text-align: left; }
  th { background: #1B4332; color: white; }
  tr:nth-child(even) { background: #f5f5f0; }
  hr { border: 0; border-top: 1px dashed #ccc; margin: 2rem 0; }
  a { color: #1B4332; }
</style>
</head>
<body>
<div id="content">Cargando…</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch('manual-agente.md')
  .then(r => r.text())
  .then(md => { document.getElementById('content').innerHTML = marked.parse(md); document.title = 'Manual de Agente — AroundaPlanet'; });
</script>
</body>
</html>
